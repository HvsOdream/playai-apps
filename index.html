<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayAI Apps · 업무 도구 허브</title>
<style>
  :root{--navy:#2E5AAC;--ink:#1c2430;--mut:#66707d;--line:#e3e8f0;--bg:#f5f7fb;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:48px 20px 70px}
  .eyebrow{color:var(--navy);font-weight:700;font-size:13px;letter-spacing:.05em}
  h1{font-size:30px;font-weight:800;margin:6px 0 8px;letter-spacing:-.01em}
  .sub{color:var(--mut);font-size:14.5px;margin-bottom:34px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  a.tool{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 20px 18px;
    text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(30,50,90,.05);transition:.15s}
  a.tool:hover{border-color:var(--navy);box-shadow:0 4px 14px rgba(46,90,172,.12);transform:translateY(-1px)}
  a.tool .ico{font-size:26px}
  a.tool h3{font-size:16.5px;font-weight:800;margin:8px 0 4px}
  a.tool p{font-size:12.5px;color:var(--mut);line-height:1.6}
  a.tool .go{margin-top:12px;font-size:12px;font-weight:700;color:var(--navy)}
  .tool.soon{opacity:.55;pointer-events:none}
  .tool.soon .go{color:var(--mut)}
  footer{margin-top:40px;font-size:11.5px;color:var(--mut);border-top:1px solid var(--line);padding-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">서일대학교 · AI게임융합학과</div>
  <h1>PlayAI Apps</h1>
  <div class="sub">학과 업무용 웹 도구 모음. 필요한 도구를 눌러 이동하세요.</div>

  <div class="grid">
    <a class="tool" href="./gpu/">
      <div class="ico">🖥️</div>
      <h3>고사양 서버 이용관리</h3>
      <p>GPU 서버 3대의 점유·잔여 현황, 2주 예약 시간표, 신청 접수 관리.</p>
      <div class="go">열기 →</div>
    </a>

    <a class="tool soon" href="#">
      <div class="ico">➕</div>
      <h3>다음 도구</h3>
      <p>새 업무 도구가 여기에 추가됩니다. (하위 폴더로 계속 확장)</p>
      <div class="go">준비 중</div>
    </a>
  </div>

  <footer>apps.playai.kr · AI게임융합학과 업무 도구 허브</footer>
</div>
</body>
</html>
